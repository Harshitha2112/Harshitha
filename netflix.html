<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Document</title>
          <style>
                   *{
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                    
                   }
                   body{
                              background: black;
                              
                    }
                    .netflix span{
                              width: 50px;
                              height: 0%;
                              background: #db0001;
                              position: absolute;
                    }
                    .netflix{
                              width: 150px;  
                              height: 250px;      
                              position: absolute;
                              top: 50%;
                              left: 50%;
                              transform: translate(-50%,-50%);
                              
                    }
                    .rect-1{
                                bottom: 0;
                                left: 0;
                                animation: flow 1s linear 1s forwards;
                              
                               
                            
                    }
                    .rect-2{
                             top: 0;
                             left: 0;
                             transform: skewX(22deg);
                             transform-origin: top left; 
                             box-shadow: 0 0 55px black;
                             z-index: 2;
                             animation: flow 1s linear 2s forwards;
                              
                    }
                    .rect-3{
                             
                             right: 0;
                             bottom: 0;
                             animation: flow 1s linear 3s forwards;
                             
                    }
                    .netflix::after{
                              content: '';
                              width: 120%;
                              height: 20px;
                              background: #000;
                              position: absolute;
                              border-radius: 50%;
                              left: -10%;
                              bottom: -10px;
                              z-index: 3;
                              
                    }
                    @keyframes flow {
                                  100%{
                                        height: 100%;
                                  }                         
                                                                      /* 0%{
                                                                      height: 0;   
                                                                      }
                                                                      50%{
                                                                                height: 50%;
                                                                      }
                                                                      100%{
                                                                                height: 100%;
                                                                      }  */
                                                                      
                    }
          </style>
</head>
<body>
          
                    <div class="netflix">
                              <span class="rect-1"></span>
                              <span class="rect-2"></span>
                              <span class="rect-3"></span>

                    </div>
          
</body>
</html>
